<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سينما VIP 🎬</title>
    <meta name="theme-color" content="#05020a">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        * { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #05020a 0%, #1a0f24 100%); color: #fff; min-height: 100vh; overflow-x: hidden; user-select: none; }
        
        .glass-card {
            background: rgba(15, 10, 20, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 45, 85, 0.2);
            border-radius: 28px;
            box-shadow: 0 18px 45px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .btn-premium {
            background: linear-gradient(135deg, #ff2d55 0%, #c41850 100%);
            box-shadow: 0 8px 25px rgba(255, 45, 85, 0.45);
            transition: all 0.25s ease;
            border: none;
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(255, 45, 85, 0.55); }
        .btn-premium:active { transform: scale(0.96); }

        .cam-container {
            position: relative;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 45, 85, 0.35);
            box-shadow: 0 15px 60px rgba(255, 45, 85, 0.18);
            display: flex;
            flex-direction: column;
        }

        .partner-cam-wrap {
            flex: 1;
            position: relative;
            min-height: 300px;
        }

        .cam-video {
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1);
            filter: brightness(1.15) contrast(1.05) saturate(1.1);
        }

        .my-floating-cam {
            position: relative;
            width: 100%;
            height: 140px;
            border-top: 2px solid rgba(48, 209, 88, 0.3);
            overflow: hidden; z-index: 20; background: #000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.4);
        }
        @media (min-width: 768px) {
            .my-floating-cam {
                position: absolute;
                bottom: 20px;
                left: 20px;
                width: 140px;
                height: 200px;
                border: 2px solid #30d158;
                border-radius: 18px;
                box-shadow: 0 12px 35px rgba(0,0,0,0.7);
            }
        }

        .toast-notify {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: rgba(255, 45, 85, 0.96); backdrop-filter: blur(12px);
            padding: 14px 28px; border-radius: 20px; font-weight: bold; z-index: 1000;
            display: flex; align-items: center; gap: 12px; font-size: 15px;
            transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px rgba(255, 45, 85, 0.35);
        }
        .toast-notify.show { transform: translateX(-50%) translateY(0); }

        .stealth-btn { 
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); 
            color: #000; font-weight: 900;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        .stealth-btn:hover { box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4); }
        
        .heart-float {
            position: fixed; bottom: -60px; font-size: 32px; pointer-events: none; z-index: 9999;
            animation: floatUp 3.2s ease-in-out forwards;
            filter: drop-shadow(0 2px 8px rgba(255,45,85,0.4));
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            18% { opacity: 1; transform: translateY(-18vh) scale(1.15); }
            100% { transform: translateY(-105vh) scale(0.75); opacity: 0; }
        }

        .video-box { 
            background: #000; position: relative; border-radius: 20px; overflow: hidden; 
            aspect-ratio: 16/9; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; outline: none; border-radius: 4px; }

        .control-btn {
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
        }
        .control-btn:hover { transform: scale(1.08); }
    </style>
</head>
<body>

    <!-- إشعار النظام -->
    <div id="toast" class="toast-notify">
        <span id="toastIcon">✨</span>
        <span id="toastMsg">رسالة</span>
    </div>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="min-h-screen flex flex-col items-center justify-center p-6 relative z-10">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black mb-3 bg-gradient-to-r from-rose-400 via-pink-500 to-purple-500 bg-clip-text text-transparent">VIP Cinema</h1>
            <p class="text-gray-400 text-base">مساحة خاصة، آمنة، ومشفرة بالكامل بيننا 💫</p>
        </div>
        <div class="glass-card p-8 w-full max-w-md flex flex-col gap-5">
            <button onclick="login('abouahad')" class="btn-premium py-5 rounded-2xl font-black text-xl flex items-center justify-center gap-3">
                <i class="fa fa-user-circle fa-lg"></i> دخول أبو عاهد 👑
            </button>
            <button onclick="login('umalara')" class="btn-premium py-5 rounded-2xl font-black text-xl flex items-center justify-center gap-3" style="background: linear-gradient(135deg, #e0115f, #ff69b4);">
                <i class="fa fa-heart fa-lg"></i> دخول أم الارا 🌸
            </button>
        </div>
    </div>

    <!-- شاشة السينما الرئيسية -->
    <div id="cinemaScreen" class="hidden min-h-screen flex flex-col p-4 gap-5 max-w-6xl mx-auto">
        <!-- شريط الحالة -->
        <div class="glass-card p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_12px_#ef4444]"></div>
                <span id="partnerStatusText" class="text-sm font-bold text-gray-300">الشريك غير متصل</span>
            </div>
            <span class="text-sm bg-rose-500/25 text-rose-400 px-4 py-1.5 rounded-full font-bold">بث مباشر 🔴</span>
        </div>

        <!-- مشغل الفيديو -->
        <div class="glass-card p-4 flex flex-col gap-3">
            <div class="flex gap-3 flex-wrap">
                <input type="text" id="vidLink" placeholder="أدخل رابط فيديو أو يوتيوب..." class="flex-grow min-w-[250px] bg-black/50 border border-white/15 rounded-xl px-5 py-3 text-base text-white focus:border-rose-500 focus:ring-1 focus:ring-rose-500 transition-all">
                <button onclick="startVideo()" class="btn-premium px-8 py-3 rounded-xl font-bold text-base"><i class="fa fa-play ml-2"></i> تشغيل الفيلم</button>
            </div>
            
            <div class="video-box shadow-2xl">
                <video id="mainVid" controls playsinline class="hidden"></video>
                <div id="ytPlayerContainer" class="hidden w-full h-full"><div id="ytPlayer"></div></div>
                <div id="vidPlaceholder" class="absolute inset-0 flex items-center justify-center bg-black/85 text-gray-400 text-lg">السينما جاهزة لبدء العرض 🎬</div>
            </div>
        </div>

        <!-- كاميرات -->
        <div class="cam-container h-[450px] md:h-[550px]">
            <!-- كاميرا الشريك في الأعلى -->
            <div class="partner-cam-wrap">
                <video id="partnerCam" class="cam-video" autoplay playsinline></video>
                
                <div id="partnerFakeMute" class="absolute inset-0 bg-[#05020a]/90 flex flex-col items-center justify-center text-rose-400 z-10 hidden">
                    <i class="fa fa-video-camera-slash text-5xl mb-3"></i>
                    <span class="text-base font-medium">الكاميرا مغلقة مؤقتاً</span>
                </div>
            </div>

            <!-- كاميرتك في الأسفل -->
            <div class="my-floating-cam">
                <video id="myCam" class="cam-video" autoplay muted playsinline></video>
                <div id="myFakeMute" class="absolute inset-0 bg-[#05020a]/90 flex flex-col items-center justify-center text-rose-400 z-10 hidden">
                    <i class="fa fa-video-camera-slash text-2xl"></i>
                </div>
            </div>

            <!-- أزرار التحكم -->
            <div class="absolute right-5 top-5 flex flex-col gap-4 z-30">
                <button onclick="sendLove()" class="control-btn w-14 h-14 rounded-full btn-premium flex items-center justify-center text-xl shadow-lg"><i class="fa fa-heart"></i></button>
                <button onclick="toggleMyCam()" id="myCamBtn" class="control-btn w-14 h-14 rounded-full bg-black/65 border border-white/25 text-white flex items-center justify-center text-lg"><i class="fa fa-video-camera"></i></button>
                <button onclick="toggleMyMic()" id="myMicBtn" class="control-btn w-14 h-14 rounded-full bg-black/65 border border-white/25 text-white flex items-center justify-center text-lg"><i class="fa fa-microphone"></i></button>
            </div>
        </div>

        <!-- لوحة التحكم السرية -->
        <div id="stealthPanel" class="hidden glass-card p-5 flex flex-wrap gap-4 justify-center border-yellow-500/35">
            <div class="w-full text-center text-sm text-yellow-500 font-black mb-1"><i class="fa fa-user-secret ml-2"></i>لوحة التحكم الخاصة</div>
            <button onclick="remoteFlip()" class="stealth-btn px-5 py-2.5 rounded-xl text-sm flex items-center gap-2"><i class="fa fa-refresh"></i> عكس اتجاه الكاميرا</button>
            <button onclick="remoteFlash()" class="stealth-btn px-5 py-2.5 rounded-xl text-sm flex items-center gap-2"><i class="fa fa-lightbulb-o"></i> تشغيل الإضاءة</button>
            <button onclick="forceSync()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg flex items-center gap-2 hover:bg-blue-700 transition-colors"><i class="fa fa-clock-o"></i> مزامنة دقيقة للوقت</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myId = '';
        let myStream = null;
        let peerConnection = null;
        let currentFacingMode = 'user';
        let flashActive = false;
        let ytPlayer = null;
        let isYtReady = false;
        let activePlayer = 'none';

        let isSyncing = false;
        let syncTimeout = null;
        let lastKnownTime = 0;

        const configuration = {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:turn.anyfirewall.com:443?transport=tcp', username: 'webrtc', credential: 'webrtc' }
            ]
        };

        function onYouTubeIframeAPIReady() { isYtReady = true; }

        function showToast(msg, icon="✨") {
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').innerText = icon;
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        async function login(userId) {
            myId = userId;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('cinemaScreen').classList.remove('hidden');
            document.getElementById('cinemaScreen').classList.add('flex');
            
            if (myId === 'abouahad') {
                document.getElementById('stealthPanel').classList.remove('hidden');
                document.getElementById('stealthPanel').classList.add('flex');
            }

            socket.emit('register-user', myId);
            await setupMedia();
            createPeerConnection();
        }

        async function setupMedia() {
            try {
                if (myStream) myStream.getTracks().forEach(t => t.stop());
                myStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                document.getElementById('myCam').srcObject = myStream;
                
                if (peerConnection) {
                    const senders = peerConnection.getSenders();
                    const videoTrack = myStream.getVideoTracks()[0];
                    const audioTrack = myStream.getAudioTracks()[0];
                    
                    const videoSender = senders.find(s => s.track?.kind === 'video');
                    if (videoSender && videoTrack) videoSender.replaceTrack(videoTrack);
                    else if (videoTrack) peerConnection.addTrack(videoTrack, myStream);
                    
                    const audioSender = senders.find(s => s.track?.kind === 'audio');
                    if (audioSender && audioTrack) audioSender.replaceTrack(audioTrack);
                    else if (audioTrack) peerConnection.addTrack(audioTrack, myStream);
                }
            } catch(e) {
                showToast('تأكد من السماح للوصول للكاميرا والميكروفون', '⚠️');
                console.error(e);
            }
        }

        function createPeerConnection() {
            if (peerConnection) peerConnection.close();
            
            peerConnection = new RTCPeerConnection(configuration);
            
            if (myStream) {
                myStream.getTracks().forEach(track => {
                    const exist = peerConnection.getSenders().find(s => s.track?.id === track.id);
                    if (!exist) peerConnection.addTrack(track, myStream);
                });
            }

            peerConnection.ontrack = (event) => {
                if (event.streams && event.streams[0]) {
                    document.getElementById('partnerCam').srcObject = event.streams[0];
                } else {
                    document.getElementById('partnerCam').srcObject = new MediaStream([event.track]);
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) socket.emit('webrtc-candidate', event.candidate);
            };

            peerConnection.onconnectionstatechange = () => {
                if(peerConnection.connectionState === 'connected') showToast('تم الاتصال بنجاح 📶', '✅');
                if(peerConnection.connectionState === 'disconnected') showToast('انقطع الاتصال، جاري إعادة المحاولة...', '🔄');
                if(peerConnection.connectionState === 'failed') {
                    setTimeout(createPeerConnection, 2000);
                }
            };
        }

        async function makeCall() {
            try {
                const offer = await peerConnection.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
                await peerConnection.setLocalDescription(offer);
                socket.emit('webrtc-offer', offer);
            } catch(e) {
                console.error(e);
            }
        }

        socket.on('partner-status', (data) => {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('partnerStatusText');
            if (data.online) {
                dot.style.backgroundColor = '#30d158';
                dot.style.boxShadow = '0 0 15px #30d158';
                txt.innerText = (myId === 'abouahad') ? 'أم الارا متصلة 💖' : 'أبو عاهد متصل 👑';
                showToast('الشريك متصل الآن! جاري الاتصال...', '✅');
                if (myId === 'abouahad') setTimeout(makeCall, 1000);
            } else {
                dot.style.backgroundColor = '#ef4444';
                dot.style.boxShadow = '0 0 12px #ef4444';
                txt.innerText = 'الشريك غير متصل حالياً';
                document.getElementById('partnerCam').srcObject = null;
            }
        });

        socket.on('webrtc-offer', async (offer) => {
            try {
                if (!peerConnection || peerConnection.signalingState === 'closed') createPeerConnection();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('webrtc-answer', answer);
            } catch(e) { console.error(e); }
        });

        socket.on('webrtc-answer', async (answer) => {
            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            } catch(e) { console.error(e); }
        });

        socket.on('webrtc-candidate', async (candidate) => {
            try { await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e){}
        });

        const mainVid = document.getElementById('mainVid');
        
        function emitCinemaState() {
            if (isSyncing) return;
            
            let currentUrl = document.getElementById('vidLink').value;
            let time = 0;
            let playing = false;

            if (activePlayer === 'html5') {
                time = mainVid.currentTime;
                playing = !mainVid.paused;
            } else if (activePlayer === 'youtube' && ytPlayer?.getCurrentTime) {
                time = ytPlayer.getCurrentTime();
                playing = ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
            }

            socket.emit('cinema-control', {
                videoUrl: currentUrl,
                isPlaying: playing,
                lastSeekTime: time,
                playerType: activePlayer
            });
        }

        mainVid.addEventListener('play', emitCinemaState);
        mainVid.addEventListener('pause', emitCinemaState);
        mainVid.addEventListener('seeked', () => {
            if (Math.abs(mainVid.currentTime - lastKnownTime) > 1.2) emitCinemaState();
            lastKnownTime = mainVid.currentTime;
        });
        mainVid.addEventListener('timeupdate', () => {
            lastKnownTime = mainVid.currentTime;
        });

        function startVideo() {
            const url = document.getElementById('vidLink').value.trim();
            if(!url) {
                showToast('أدخل رابط الفيديو أولاً', '⚠️');
                return;
            }
            
            document.getElementById('vidPlaceholder').style.display = 'none';
            mainVid.classList.add('hidden');
            document.getElementById('ytPlayerContainer').classList.add('hidden');
            
            if (ytPlayer) { try { ytPlayer.destroy(); ytPlayer = null; } catch(e){} }

            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                activePlayer = 'youtube';
                document.getElementById('ytPlayerContainer').classList.remove('hidden');
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('youtu.be/')[1].split('?')[0];
                ytPlayer = new YT.Player('ytPlayer', {
                    height: '100%', width: '100%', videoId: vid,
                    playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'modestbranding': 1 },
                    events: {
                        'onReady': () => { if(isSyncing) return; ytPlayer.playVideo(); },
                        'onStateChange': (e) => {
                            if (e.data === YT.PlayerState.PLAYING || e.data === YT.PlayerState.PAUSED) emitCinemaState();
                        }
                    }
                });
            } else {
                activePlayer = 'html5';
                mainVid.classList.remove('hidden');
                mainVid.src = url;
                mainVid.load();
                mainVid.play().catch(e => showToast('اضغط على زر التشغيل بالفيديو', '🎬'));
            }
            setTimeout(emitCinemaState, 500);
        }

        socket.on('cinema-state-update', (state) => {
            if (!state.videoUrl) return;
            
            isSyncing = true;
            clearTimeout(syncTimeout);
            
            document.getElementById('vidLink').value = state.videoUrl;
            
            if (activePlayer !== state.playerType || 
                (state.playerType === 'html5' && !mainVid.src.includes(state.videoUrl))) {
                startVideo();
            } else {
                if (activePlayer === 'html5') {
                    if (Math.abs(mainVid.currentTime - state.lastSeekTime) > 1.2) {
                        mainVid.currentTime = state.lastSeekTime;
                        lastKnownTime = state.lastSeekTime;
                    }
                    if (state.isPlaying && mainVid.paused) mainVid.play().catch(e=>{});
                    if (!state.isPlaying && !mainVid.paused) mainVid.pause();
                } else if (activePlayer === 'youtube' && ytPlayer?.getCurrentTime) {
                    if (Math.abs(ytPlayer.getCurrentTime() - state.lastSeekTime) > 1.2) {
                        ytPlayer.seekTo(state.lastSeekTime, true);
                    }
                    if (state.isPlaying && ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) ytPlayer.playVideo();
                    if (!state.isPlaying && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
                }
            }

            syncTimeout = setTimeout(() => { isSyncing = false; }, 600);
        });

        function forceSync() {
            emitCinemaState();
            showToast('تمت المزامنة بدقة تامة ⏱️', '✅');
        }

        function sendLove() {
            socket.emit('love-pulse');
            showHearts();
            showToast('تم إرسال نبضة حب قوية 💖', '💌');
        }
        socket.on('love-pulse-received', () => {
            showHearts();
            showToast('وصلتك نبضة حب من الشريك 💓', '💕');
        });
        function showHearts() {
            for(let i=0; i<18; i++) {
                setTimeout(() => {
                    let h = document.createElement('div');
                    h.className = 'heart-float'; h.innerText = ['💖','💕','💗','💓'][Math.floor(Math.random()*4)];
                    h.style.left = Math.random() * 85 + 5 + 'vw';
                    h.style.animationDuration = (Math.random() * 1.5 + 2.2) + 's';
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 4500);
                }, i * 120);
            }
        }

        function toggleMyCam() {
            const track = myStream?.getVideoTracks()[0];
            if(!track) return;
            
            const btn = document.getElementById('myCamBtn');
            const fake = document.getElementById('myFakeMute');
            
            if (myId === 'umalara') {
                const isHidden = fake.style.display === 'flex';
                if (!isHidden) {
                    fake.style.display = 'flex'; 
                    btn.style.background = 'rgba(239,68,68,0.85)'; 
                    btn.innerHTML = '<i class="fa fa-ban"></i>';
                    socket.emit('privacy-fake-mute', true);
                } else {
                    fake.style.display = 'none'; 
                    btn.style.background = 'rgba(0,0,0,0.65)'; 
                    btn.innerHTML = '<i class="fa fa-video-camera"></i>';
                    socket.emit('privacy-fake-mute', false);
                }
            } else {
                track.enabled = !track.enabled;
                if(track.enabled) { 
                    fake.style.display='none'; 
                    btn.style.background = 'rgba(0,0,0,0.65)'; 
                    btn.innerHTML = '<i class="fa fa-video-camera"></i>'; 
                } else { 
                    fake.style.display='flex'; 
                    btn.style.background = 'rgba(239,68,68,0.85)'; 
                    btn.innerHTML = '<i class="fa fa-ban"></i>'; 
                }
            }
        }

        function toggleMyMic() {
            const track = myStream?.getAudioTracks()[0];
            const btn = document.getElementById('myMicBtn');
            if(!track) return;
            
            if (myId === 'umalara') {
                const isMuted = btn.style.background.includes('239,68,68');
                if(!isMuted) { 
                    btn.style.background = 'rgba(239,68,68,0.85)'; 
                    btn.innerHTML = '<i class="fa fa-microphone-slash"></i>'; 
                } else { 
                    btn.style.background = 'rgba(0,0,0,0.65)'; 
                    btn.innerHTML = '<i class="fa fa-microphone"></i>'; 
                }
            } else {
                track.enabled = !track.enabled;
                if(track.enabled) { 
                    btn.style.background = 'rgba(0,0,0,0.65)'; 
                    btn.innerHTML = '<i class="fa fa-microphone"></i>'; 
                } else { 
                    btn.style.background = 'rgba(239,68,68,0.85)'; 
                    btn.innerHTML = '<i class="fa fa-microphone-slash"></i>'; 
                }
            }
        }

        socket.on('privacy-fake-mute-received', (muted) => {
            if (myId === 'abouahad') {
                document.getElementById('partnerFakeMute').style.display = 'none';
            }
        });

        function remoteFlip() { socket.emit('remote-flip-cam'); }
        function remoteFlash() { socket.emit('remote-flash-toggle'); }

        socket.on('remote-flip-cam-triggered', async () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            await setupMedia();
            showToast('تم عكس اتجاه الكاميرا', '🔄');
        });

        socket.on('remote-flash-triggered', async () => {
            const track = myStream?.getVideoTracks()[0];
            if(!track) return;
            flashActive = !flashActive;
            try { 
                await track.applyConstraints({ advanced: [{ torch: flashActive }] }); 
                showToast(flashActive ? 'تم تشغيل الإضاءة' : 'تم إطفاء الإضاءة', flashActive ? '💡' : '🔦');
            } catch(e){ showToast('الإضاءة غير مدعومة في هذا الجهاز', 'ℹ️'); }
        });

        window.addEventListener('beforeunload', () => {
            if(myStream) myStream.getTracks().forEach(t => t.stop());
            if(peerConnection) peerConnection.close();
        });
    </script>
</body>
</html>
