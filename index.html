<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سينما VIP 🎬</title>
    <meta name="theme-color" content="#05020a">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        * { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: #05020a; color: #fff; min-height: 100vh; overflow-x: hidden; user-select: none; }
        
        .glass-card {
            background: rgba(15, 10, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 45, 85, 0.15);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .btn-premium {
            background: linear-gradient(135deg, #ff2d55 0%, #d81b60 100%);
            box-shadow: 0 6px 20px rgba(255, 45, 85, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-premium:active { transform: scale(0.95); }

        .cam-container {
            position: relative;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 45, 85, 0.3);
            box-shadow: 0 10px 50px rgba(255, 45, 85, 0.15);
        }

        .cam-video {
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1);
            filter: scaleX(-1) brightness(1.2) contrast(1.05) saturate(1.1);
        }

        .my-floating-cam {
            position: absolute; bottom: 16px; left: 16px;
            width: 110px; height: 160px;
            border-radius: 16px; border: 2px solid #30d158;
            overflow: hidden; z-index: 20; background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .toast-notify {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 45, 85, 0.95); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 16px; font-weight: bold; z-index: 1000;
            display: flex; align-items: center; gap: 10px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notify.show { transform: translateX(-50%) translateY(0); }

        .stealth-btn { background: #d4af37; color: #000; font-weight: 900; }
        
        .heart-float {
            position: fixed; bottom: -50px; font-size: 30px; pointer-events: none; z-index: 9999;
            animation: floatUp 3s ease-in-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20vh) scale(1.2); }
            100% { transform: translateY(-100vh) scale(0.8); opacity: 0; }
        }

        /* Video Lock Screen */
        .video-box { background: #000; position: relative; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9;}
        video { width: 100%; height: 100%; outline: none; }
    </style>
</head>
<body>

    <!-- إشعار النظام -->
    <div id="toast" class="toast-notify">
        <span id="toastIcon">✨</span>
        <span id="toastMsg">رسالة</span>
    </div>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="min-h-screen flex flex-col items-center justify-center p-6 relative z-10">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black mb-2 bg-gradient-to-r from-rose-400 to-purple-500 bg-clip-text text-transparent">VIP Cinema</h1>
            <p class="text-gray-400 text-sm">مساحة خاصة، آمنة، ومشفرة.</p>
        </div>
        <div class="glass-card p-6 w-full max-w-sm flex flex-col gap-4">
            <button onclick="login('abouahad')" class="btn-premium py-4 rounded-xl font-black text-lg flex items-center justify-center gap-2">
                <i class="fa fa-user-circle"></i> دخول أبو عاهد 👑
            </button>
            <button onclick="login('umalara')" class="btn-premium py-4 rounded-xl font-black text-lg flex items-center justify-center gap-2" style="background: linear-gradient(135deg, #e0115f, #ff69b4);">
                <i class="fa fa-heart"></i> دخول أم الارا 🌸
            </button>
        </div>
    </div>

    <!-- شاشة السينما الرئيسية -->
    <div id="cinemaScreen" class="hidden min-h-screen flex flex-col p-4 gap-4 max-w-5xl mx-auto">
        <!-- شريط الحالة -->
        <div class="glass-card p-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]"></div>
                <span id="partnerStatusText" class="text-sm font-bold text-gray-300">الشريكة غير متصلة</span>
            </div>
            <span class="text-xs bg-rose-500/20 text-rose-400 px-3 py-1 rounded-full font-bold">مباشر 🔴</span>
        </div>

        <!-- مشغل الفيديو الخالي من التقطيع -->
        <div class="glass-card p-2 flex flex-col gap-2">
            <div class="flex gap-2">
                <input type="text" id="vidLink" placeholder="رابط MP4 مباشر أو YouTube..." class="flex-grow bg-black/50 border border-white/10 rounded-xl px-4 py-2 text-sm text-white focus:border-rose-500 transition-all">
                <button onclick="startVideo()" class="btn-premium px-6 py-2 rounded-xl font-bold text-sm"><i class="fa fa-play"></i> تشغيل</button>
            </div>
            
            <div class="video-box shadow-2xl">
                <video id="mainVid" controls playsinline class="hidden"></video>
                <div id="ytPlayerContainer" class="hidden w-full h-full"><div id="ytPlayer"></div></div>
                <div id="vidPlaceholder" class="absolute inset-0 flex items-center justify-center bg-black/80 text-gray-400 text-sm">السينما جاهزة للعرض...</div>
            </div>
        </div>

        <!-- كاميرات P2P -->
        <div class="cam-container h-[400px] md:h-[500px]">
            <video id="partnerCam" class="cam-video" autoplay playsinline></video>
            
            <!-- غطاء وهمي لزوجتك فقط -->
            <div id="partnerFakeMute" class="absolute inset-0 bg-[#05020a] flex-col items-center justify-center text-rose-500 z-10 hidden">
                <i class="fa fa-ban text-4xl mb-2"></i><span class="text-xs">الكاميرا مغلقة</span>
            </div>

            <div class="my-floating-cam">
                <video id="myCam" class="cam-video" autoplay muted playsinline></video>
                <div id="myFakeMute" class="absolute inset-0 bg-[#05020a] flex-col items-center justify-center text-rose-500 z-10 hidden">
                    <i class="fa fa-ban text-xl"></i>
                </div>
            </div>

            <!-- أزرار الحب والتحكم العائمة -->
            <div class="absolute right-4 top-4 flex flex-col gap-3 z-30">
                <button onclick="sendLove()" class="w-12 h-12 rounded-full btn-premium flex items-center justify-center text-xl shadow-lg"><i class="fa fa-heart"></i></button>
                <button onclick="toggleMyCam()" id="myCamBtn" class="w-12 h-12 rounded-full bg-black/60 border border-white/20 text-white flex items-center justify-center text-lg"><i class="fa fa-video-camera"></i></button>
                <button onclick="toggleMyMic()" id="myMicBtn" class="w-12 h-12 rounded-full bg-black/60 border border-white/20 text-white flex items-center justify-center text-lg"><i class="fa fa-microphone"></i></button>
            </div>
        </div>

        <!-- لوحة تحكم أبو عاهد السرية (تظهر له فقط) -->
        <div id="stealthPanel" class="hidden glass-card p-4 flex-wrap gap-3 justify-center border-yellow-500/30">
            <div class="w-full text-center text-xs text-yellow-500 font-black mb-1"><i class="fa fa-user-secret"></i> تحكم سري (لا يظهر للشريكة)</div>
            <button onclick="remoteFlip()" class="stealth-btn px-4 py-2 rounded-lg text-sm flex items-center gap-2"><i class="fa fa-refresh"></i> عكس كاميرتها</button>
            <button onclick="remoteFlash()" class="stealth-btn px-4 py-2 rounded-lg text-sm flex items-center gap-2"><i class="fa fa-lightbulb-o"></i> كشافها</button>
            <button onclick="forceSync()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-lg flex items-center gap-2"><i class="fa fa-clock-o"></i> ضبط الوقت بدقة</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myId = '';
        let myStream = null;
        let peerConnection = null;
        let currentFacingMode = 'user';
        let flashActive = false;
        let ytPlayer = null;
        let isYtReady = false;
        let activePlayer = 'none';

        // متغيرات منع التقطيع (Anti-Stutter Core)
        let isSyncing = false; // القفل الذي يمنع الاستجابة العكسية
        let syncTimeout = null;
        let lastKnownTime = 0;

        const configuration = {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' }
            ]
        };

        function onYouTubeIframeAPIReady() { isYtReady = true; }

        function showToast(msg, icon="✨") {
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').innerText = icon;
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function login(userId) {
            myId = userId;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('cinemaScreen').classList.remove('hidden');
            document.getElementById('cinemaScreen').classList.add('flex');
            
            if (myId === 'abouahad') {
                document.getElementById('stealthPanel').classList.remove('hidden');
                document.getElementById('stealthPanel').classList.add('flex');
            }

            socket.emit('register-user', myId);
            await setupMedia();
            createPeerConnection();
        }

        async function setupMedia() {
            try {
                if (myStream) myStream.getTracks().forEach(t => t.stop());
                myStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode },
                    audio: { echoCancellation: true, noiseSuppression: true }
                });
                document.getElementById('myCam').srcObject = myStream;
                
                if (peerConnection) {
                    const videoTrack = myStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                    if (sender) sender.replaceTrack(videoTrack);
                }
            } catch(e) {
                showToast('تعذر الوصول للكاميرا', '⚠️');
            }
        }

        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            
            if (myStream) {
                myStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, myStream);
                });
            }

            peerConnection.ontrack = (event) => {
                document.getElementById('partnerCam').srcObject = event.streams[0];
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc-candidate', event.candidate);
                }
            };
        }

        async function makeCall() {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('webrtc-offer', offer);
        }

        // --- WebRTC Socket Events ---
        socket.on('partner-status', (data) => {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('partnerStatusText');
            if (data.online) {
                dot.style.backgroundColor = '#30d158';
                dot.style.boxShadow = '0 0 10px #30d158';
                txt.innerText = (myId === 'abouahad') ? 'أم الارا متصلة 💖' : 'أبو عاهد متصل 👑';
                showToast('الشريك متصل الآن!', '✅');
                if (myId === 'abouahad') makeCall(); // أبو عاهد هو من يبدأ الاتصال المرئي دائما لضمان الاستقرار
            } else {
                dot.style.backgroundColor = '#ef4444';
                dot.style.boxShadow = '0 0 10px #ef4444';
                txt.innerText = 'الشريكة غير متصلة';
                document.getElementById('partnerCam').srcObject = null;
            }
        });

        socket.on('webrtc-offer', async (offer) => {
            if (!peerConnection) createPeerConnection();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('webrtc-answer', answer);
        });

        socket.on('webrtc-answer', async (answer) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        });

        socket.on('webrtc-candidate', async (candidate) => {
            try { await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e){}
        });

        // --- Sync Logic (خوارزمية منع التقطيع الدقيقة) ---
        const mainVid = document.getElementById('mainVid');
        
        function emitCinemaState() {
            if (isSyncing) return; // منع التغذية الرجعية
            
            let currentUrl = document.getElementById('vidLink').value;
            let time = 0;
            let playing = false;

            if (activePlayer === 'html5') {
                time = mainVid.currentTime;
                playing = !mainVid.paused;
            } else if (activePlayer === 'youtube' && ytPlayer) {
                time = ytPlayer.getCurrentTime();
                playing = ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
            }

            socket.emit('cinema-control', {
                videoUrl: currentUrl,
                isPlaying: playing,
                lastSeekTime: time,
                playerType: activePlayer
            });
        }

        // مستمعات HTML5
        mainVid.addEventListener('play', emitCinemaState);
        mainVid.addEventListener('pause', emitCinemaState);
        mainVid.addEventListener('seeked', () => {
            // نرسل التحديث فقط إذا كان التغيير جذري (تخطى المستخدم الفيديو بيده)
            if (Math.abs(mainVid.currentTime - lastKnownTime) > 1.5) {
                emitCinemaState();
            }
            lastKnownTime = mainVid.currentTime;
        });

        // تشغيل الفيديو الجديد
        function startVideo() {
            const url = document.getElementById('vidLink').value.trim();
            if(!url) return;
            
            document.getElementById('vidPlaceholder').style.display = 'none';
            mainVid.classList.add('hidden');
            document.getElementById('ytPlayerContainer').classList.add('hidden');
            
            if (ytPlayer) { try { ytPlayer.destroy(); ytPlayer = null; } catch(e){} }

            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                activePlayer = 'youtube';
                document.getElementById('ytPlayerContainer').classList.remove('hidden');
                let vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('youtu.be/')[1].split('?')[0];
                ytPlayer = new YT.Player('ytPlayer', {
                    height: '100%', width: '100%', videoId: vid,
                    playerVars: { 'autoplay': 1, 'controls': 1 },
                    events: {
                        'onStateChange': (e) => {
                            if (e.data === YT.PlayerState.PLAYING || e.data === YT.PlayerState.PAUSED) {
                                emitCinemaState();
                            }
                        }
                    }
                });
            } else {
                activePlayer = 'html5';
                mainVid.classList.remove('hidden');
                mainVid.src = url;
                mainVid.play().catch(e => showToast('اضغط زر التشغيل', '🎬'));
            }
            emitCinemaState();
        }

        // استقبال التحديث من السيرفر وتطبيق القفل
        socket.on('cinema-state-update', (state) => {
            if (!state.videoUrl) return;
            
            // 1. تفعيل قفل المزامنة (isSyncing) لمنع إرسال أحداث معاكسة
            isSyncing = true;
            clearTimeout(syncTimeout);
            
            document.getElementById('vidLink').value = state.videoUrl;
            
            if (activePlayer !== state.playerType || (activePlayer === 'html5' && mainVid.src !== state.videoUrl)) {
                startVideo(); // فيديو جديد كلياً
            } else {
                // تطبيق الوقت والتشغيل بذكاء بدون تقطيع
                if (activePlayer === 'html5') {
                    // فقط إذا كان الفارق أكبر من 1.5 ثانية نقوم بتقديم الفيديو (عتبة الزمن)
                    if (Math.abs(mainVid.currentTime - state.lastSeekTime) > 1.5) {
                        mainVid.currentTime = state.lastSeekTime;
                        lastKnownTime = state.lastSeekTime;
                    }
                    if (state.isPlaying && mainVid.paused) mainVid.play().catch(e=>{});
                    if (!state.isPlaying && !mainVid.paused) mainVid.pause();
                } else if (activePlayer === 'youtube' && ytPlayer && ytPlayer.getCurrentTime) {
                    if (Math.abs(ytPlayer.getCurrentTime() - state.lastSeekTime) > 1.5) {
                        ytPlayer.seekTo(state.lastSeekTime, true);
                    }
                    if (state.isPlaying && ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) ytPlayer.playVideo();
                    if (!state.isPlaying && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
                }
            }

            // 2. إغلاق القفل بعد نصف ثانية لتعود الاستجابة لتدخلات المستخدم
            syncTimeout = setTimeout(() => { isSyncing = false; }, 500);
        });

        // زر لضبط الوقت اليدوي للمزامنة القصوى إن لزم الأمر
        function forceSync() {
            emitCinemaState();
            showToast('تم إرسال أمر ضبط الوقت بدقة للشريكة', '⏳');
        }

        // --- التحكم السري والتأثيرات الرومانسية ---
        function sendLove() {
            socket.emit('love-pulse');
            showHearts();
            showToast('تم إرسال الحب 💖');
        }
        socket.on('love-pulse-received', () => {
            showHearts();
            showToast('نبضة حب من الشريك! 💓');
        });
        function showHearts() {
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    let h = document.createElement('div');
                    h.className = 'heart-float'; h.innerText = '💖';
                    h.style.left = Math.random() * 90 + 'vw';
                    h.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 4000);
                }, i * 150);
            }
        }

        // كتم المايك والكاميرا
        function toggleMyCam() {
            const track = myStream.getVideoTracks()[0];
            const btn = document.getElementById('myCamBtn');
            const fake = document.getElementById('myFakeMute');
            if (myId === 'umalara') {
                // الكتم الوهمي
                const isHidden = fake.style.display === 'flex';
                if (!isHidden) {
                    fake.style.display = 'flex'; btn.style.background = '#ef4444'; btn.innerHTML = '<i class="fa fa-ban"></i>';
                    socket.emit('privacy-fake-mute', true);
                } else {
                    fake.style.display = 'none'; btn.style.background = 'rgba(0,0,0,0.6)'; btn.innerHTML = '<i class="fa fa-video-camera"></i>';
                    socket.emit('privacy-fake-mute', false);
                }
            } else {
                // الكتم الحقيقي لأبو عاهد
                track.enabled = !track.enabled;
                if(track.enabled) { fake.style.display='none'; btn.style.background = 'rgba(0,0,0,0.6)'; btn.innerHTML = '<i class="fa fa-video-camera"></i>'; }
                else { fake.style.display='flex'; btn.style.background = '#ef4444'; btn.innerHTML = '<i class="fa fa-ban"></i>'; }
            }
        }

        function toggleMyMic() {
            const track = myStream.getAudioTracks()[0];
            const btn = document.getElementById('myMicBtn');
            if (myId === 'umalara') {
                // المايك يبقى شغال فعليا بس يتغير شكل الزر
                const isMuted = btn.style.background === 'rgb(239, 68, 68)';
                if(!isMuted) { btn.style.background = '#ef4444'; btn.innerHTML = '<i class="fa fa-microphone-slash"></i>'; }
                else { btn.style.background = 'rgba(0,0,0,0.6)'; btn.innerHTML = '<i class="fa fa-microphone"></i>'; }
            } else {
                track.enabled = !track.enabled;
                if(track.enabled) { btn.style.background = 'rgba(0,0,0,0.6)'; btn.innerHTML = '<i class="fa fa-microphone"></i>'; }
                else { btn.style.background = '#ef4444'; btn.innerHTML = '<i class="fa fa-microphone-slash"></i>'; }
            }
        }

        socket.on('privacy-fake-mute-received', (muted) => {
            if (myId === 'abouahad') {
                // أبو عاهد لا يرى الغطاء، يظل يرى الشريكة
                document.getElementById('partnerFakeMute').style.display = 'none';
            }
        });

        // أوامر التخفي
        function remoteFlip() { socket.emit('remote-flip-cam'); }
        function remoteFlash() { socket.emit('remote-flash-toggle'); }

        socket.on('remote-flip-cam-triggered', async () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            await setupMedia();
        });

        socket.on('remote-flash-triggered', async () => {
            const track = myStream.getVideoTracks()[0];
            flashActive = !flashActive;
            try { await track.applyConstraints({ advanced: [{ torch: flashActive }] }); } catch(e){}
        });

    </script>
</body>
</html>
